<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Online Health Checkup System</title>
<style>
body { font-family: Arial, sans-serif; background: #f0f0f0; margin:0; padding:0; }
.container { max-width: 650px; margin: auto; padding: 20px; background: white; margin-top: 30px; border-radius: 10px; box-shadow: 0 0 10px #ccc; }
h2 { text-align: center; }
input, select, textarea, button { width: 100%; padding: 8px; margin: 5px 0; }
button { cursor: pointer; }
.hidden { display: none; }
.record-card { border:1px solid #ccc; padding:10px; margin:5px; border-radius:5px; }
.speaker { cursor:pointer; margin-left:5px; }
</style>
</head>
<body>

<div class="container" id="loginDiv">
  <h2 id="loginTitle">Login</h2>
  <label id="userTypeLabel">User Type:</label>
  <select id="userType">
    <option value="patient">Patient</option>
    <option value="doctor">Doctor</option>
  </select>
  <input type="text" id="username" placeholder="Username">
  <input type="password" id="password" placeholder="Password">
  <button onclick="login()">Login</button>
  <button onclick="speakText('login')">🔊</button>
  <p id="loginMsg" style="color:red;"></p>
  <label>Select Language:</label>
  <select id="languageSelect" onchange="setLanguage()">
    <option value="en">English</option>
    <option value="ne">नेपाली</option>
  </select>
</div>

<div class="container hidden" id="patientDiv">
  <h2 id="patientTitle">Patient Dashboard</h2>
  <label id="selectDoctorLabel">Select Doctor:</label>
  <select id="selectDoctor"></select>
  <label id="appointmentLabel">Appointment Date & Time:</label>
  <input type="datetime-local" id="appointDate">
  <label id="diseaseLabel">Enter Disease:</label>
  <input type="text" id="disease">
  <button onclick="saveAppointment()" id="setAppBtn">Set Appointment</button>
  <button onclick="speakText('appointment')">🔊</button>
  <h3 id="recordsTitle">Your Records</h3>
  <div id="records"></div>
  <button onclick="logout()" id="logoutBtn">Logout</button>
</div>

<div class="container hidden" id="doctorDiv">
  <h2 id="doctorTitle">Doctor Dashboard</h2>
  <div id="doctorInfo"></div>
  <h3 id="patientsTitle">Patients Assigned to You</h3>
  <div id="allRecords"></div>
  <h3 id="addPresTitle">Add/Update Prescription</h3>
  <label id="patientNameLabel">Patient Username:</label>
  <input type="text" id="patientName">
  <label id="diseaseInputLabel">Disease:</label>
  <input type="text" id="diseaseInput">
  <label id="medicinesLabel">Prescription / Medicines:</label>
  <textarea id="medicines"></textarea>
  <label id="precautionsLabel">Precautions / Conclusion:</label>
  <textarea id="precautions"></textarea>
  <button onclick="saveDoctorData()" id="saveBtn">Save</button>
  <button onclick="logout()" id="logoutBtn2">Logout</button>
</div>

<script>
// ---------------- Doctor + Recommendation Data ----------------
const doctors = [
  { username: 'dr_sunil', password: '1234', name: 'Dr. Sunil Sharma', capability: 'Cardiologist' },
  { username: 'dr_rita', password: '5678', name: 'Dr. Rita Koirala', capability: 'Dermatologist' },
  { username: 'dr_raj', password: 'abcd', name: 'Dr. Raj Thapa', capability: 'General Physician' }
];

const recommendations = {
  'Fever': { medicines: 'Paracetamol 500mg, twice a day', precautions: 'Drink warm water, rest, avoid cold food', conclusion: 'Monitor temperature daily' },
  'Cough': { medicines: 'Cough syrup 10ml, 3 times a day', precautions: 'Avoid cold drinks, keep throat warm', conclusion: 'If persists more than 5 days, consult again' },
  'Headache': { medicines: 'Painkiller (Ibuprofen 400mg, if needed)', precautions: 'Rest, avoid screen for long time', conclusion: 'Stay hydrated' }
};

// ---------------- Multilingual Texts ----------------
const texts = {
  en: {
    login:'Login', username:'Username', password:'Password', patientDashboard:'Patient Dashboard', doctorDashboard:'Doctor Dashboard',
    appointment:'Appointment Date & Time', disease:'Disease', prescription:'Prescription & Advice', precautions:'Precautions & Conclusion',
    selectDoctor:'Select Doctor', yourRecords:'Your Records', logout:'Logout', setAppointment:'Set Appointment',
    patientsAssigned:'Patients Assigned to You', addPrescription:'Add/Update Prescription', patientUsername:'Patient Username'
  },
  ne: {
    login:'लगइन', username:'प्रयोगकर्ता नाम', password:'पासवर्ड', patientDashboard:'रोगी ड्यासबोर्ड', doctorDashboard:'डाक्टर ड्यासबोर्ड',
    appointment:'अपोइन्टमेन्ट मिति र समय', disease:'रोग', prescription:'प्रिस्क्रिप्सन र सल्लाह', precautions:'सावधानी र निष्कर्ष',
    selectDoctor:'डाक्टर चयन गर्नुहोस्', yourRecords:'तपाईंको रेकर्ड', logout:'लगआउट', setAppointment:'अपोइन्टमेन्ट सेट गर्नुहोस्',
    patientsAssigned:'तपाईंका रोगी', addPrescription:'प्रिस्क्रिप्सन/सल्लाह थप्नुहोस्', patientUsername:'रोगी नाम'
  }
};

// ---------------- Global Variables ----------------
let currentUser = '';
let currentDoctor = null;
let currentLang = 'en';

// ---------------- Language Functions ----------------
function setLanguage(){
  currentLang = document.getElementById('languageSelect').value;
  document.getElementById('username').placeholder = texts[currentLang].username;
  document.getElementById('password').placeholder = texts[currentLang].password;
  document.getElementById('loginTitle').textContent = texts[currentLang].login;
  document.getElementById('patientTitle').textContent = texts[currentLang].patientDashboard;
  document.getElementById('doctorTitle').textContent = texts[currentLang].doctorDashboard;
  document.getElementById('selectDoctorLabel').textContent = texts[currentLang].selectDoctor;
  document.getElementById('appointmentLabel').textContent = texts[currentLang].appointment;
  document.getElementById('diseaseLabel').textContent = texts[currentLang].disease;
  document.getElementById('setAppBtn').textContent = texts[currentLang].setAppointment;
  document.getElementById('recordsTitle').textContent = texts[currentLang].yourRecords;
  document.getElementById('logoutBtn').textContent = texts[currentLang].logout;
  document.getElementById('patientsTitle').textContent = texts[currentLang].patientsAssigned;
  document.getElementById('addPresTitle').textContent = texts[currentLang].addPrescription;
  document.getElementById('patientNameLabel').textContent = texts[currentLang].patientUsername;
  document.getElementById('medicinesLabel').textContent = texts[currentLang].prescription;
  document.getElementById('precautionsLabel').textContent = texts[currentLang].precautions;
}

// Text-to-Speech
function speakText(key){
  const utter = new SpeechSynthesisUtterance(texts[currentLang][key]);
  utter.lang = currentLang==='ne'?'ne-NP':'en-US';
  window.speechSynthesis.speak(utter);
}

// ---------------- Login ----------------
function login() {
  const type = document.getElementById('userType').value;
  const user = document.getElementById('username').value.trim();
  const pass = document.getElementById('password').value.trim();
  const msg = document.getElementById('loginMsg');

  if(type==='doctor'){
    const doctor = doctors.find(d=>d.username===user && d.password===pass);
    if(doctor){
      currentUser = doctor.username;
      currentDoctor = doctor;
      document.getElementById('loginDiv').classList.add('hidden');
      document.getElementById('doctorDiv').classList.remove('hidden');
      document.getElementById('doctorInfo').innerHTML = `<p>Welcome ${doctor.name} (${doctor.capability})</p>`;
      showDoctorPatients();
    } else { msg.textContent = 'Invalid Doctor Credentials'; }
  } else {
    if(!user||!pass){ msg.textContent=currentLang==='ne'?'नाम र पासवर्ड प्रविष्ट गर्नुहोस्':'Enter username & password'; return;}
    currentUser = user;
    document.getElementById('loginDiv').classList.add('hidden');
    document.getElementById('patientDiv').classList.remove('hidden');
    loadDoctorOptions();
    loadPatientRecords();
  }
}

// ---------------- Logout ----------------
function logout(){
  currentUser=''; currentDoctor=null;
  document.getElementById('loginDiv').classList.remove('hidden');
  document.getElementById('patientDiv').classList.add('hidden');
  document.getElementById('doctorDiv').classList.add('hidden');
  document.getElementById('username').value=''; document.getElementById('password').value='';
}

// ---------------- Doctor Options for Patient ----------------
function loadDoctorOptions(){
  const select = document.getElementById('selectDoctor'); select.innerHTML='';
  doctors.forEach(d=>{ select.innerHTML+=`<option value="${d.username}">${d.name} (${d.capability})</option>`; });
}

// ---------------- Appointment Save ----------------
function saveAppointment(){
  const date = document.getElementById('appointDate').value;
  const doctor = document.getElementById('selectDoctor').value;
  const disease = document.getElementById('disease').value.trim();
  if(!date||!disease) return alert(currentLang==='ne'?'मिति र रोग प्रविष्ट गर्नुहोस्':'Enter date & disease');
  let records = JSON.parse(localStorage.getItem('records')||'{}');
  records[currentUser] = records[currentUser]||{};
  records[currentUser].appointment=date;
  records[currentUser].doctor=doctor;
  records[currentUser].disease=disease;
  if(recommendations[disease]){
    records[currentUser].medicines=recommendations[disease].medicines;
    records[currentUser].precautions=recommendations[disease].precautions+". Conclusion: "+recommendations[disease].conclusion;
  }
  localStorage.setItem('records',JSON.stringify(records));
  alert(currentLang==='ne'?'अपोइन्टमेन्ट सफल':'Appointment saved');
  loadPatientRecords();
  setAppointmentAlarm(date,currentUser);
}

// ---------------- Patient Records ----------------
function loadPatientRecords(){
  let records=JSON.parse(localStorage.getItem('records')||'{}');
  const userData=records[currentUser]||{};
  const doctorObj = doctors.find(d=>d.username===userData.doctor);
  const doctorName = doctorObj?doctorObj.name:'Not selected';
  document.getElementById('records').innerHTML = `
    <p>${currentLang==='ne'?'डाक्टर':'Doctor'}: ${doctorName}</p>
    <p>${currentLang==='ne'?'अपोइन्टमेन्ट':'Appointment'}: ${userData.appointment||'Not set'}</p>
    <p>${currentLang==='ne'?'रोग':'Disease'}: ${userData.disease||'N/A'}</p>
    <p>${currentLang==='ne'?'प्रिस्क्रिप्सन र सल्लाह':'Prescription & Advice'}: ${userData.medicines||'N/A'}</p>
    <p>${currentLang==='ne'?'सावधानी र निष्कर्ष':'Precautions & Conclusion'}: ${userData.precautions||'N/A'}</p>
  `;
}

// ---------------- Doctor Dashboard Patients ----------------
function showDoctorPatients(){
  let records=JSON.parse(localStorage.getItem('records')||'{}');
  let html='';
  for(let user in records){
    if(records[user].doctor===currentDoctor.username){
      html+=`<div class="record-card">
        <strong>${user}</strong><br>
        ${currentLang==='ne'?'अपोइन्टमेन्ट':'Appointment'}: ${records[user].appointment||'Not set'}<br>
        ${currentLang==='ne'?'रोग':'Disease'}: ${records[user].disease||'N/A'}<br>
        ${currentLang==='ne'?'प्रिस्क्रिप्सन':'Prescription'}: ${records[user].medicines||'N/A'}<br>
        ${currentLang==='ne'?'सावधानी':'Precautions'}: ${records[user].precautions||'N/A'}
      </div>`;
    }
  }
  document.getElementById('allRecords').innerHTML=html;
}

// ---------------- Doctor Data Save ----------------
function saveDoctorData(){
  const patient = document.getElementById('patientName').value.trim();
  const disease = document.getElementById('diseaseInput').value.trim();
  const meds = document.getElementById('medicines').value.trim();
  const precautions = document.getElementById('precautions').value.trim();
  if(!patient) return alert(currentLang==='ne'?'रोगी नाम प्रविष्ट गर्नुहोस्':'Enter patient username');
  let records=JSON.parse(localStorage.getItem('records')||'{}');
  records[patient]=records[patient]||{};
  records[patient].disease=disease||records[patient].disease;
  records[patient].medicines=meds||records[patient].medicines;
  records[patient].precautions=precautions||records[patient].precautions;
  localStorage.setItem('records',JSON.stringify(records));
  alert(currentLang==='ne'?'डेटा सुरक्षित':'Data saved');
  showDoctorPatients();
}

// ---------------- Appointment Alarm ----------------
function setAppointmentAlarm(dateStr,user){
  const appointTime = new Date(dateStr).getTime();
  const diff = appointTime - new Date().getTime();
  if(diff>0){ setTimeout(()=>{ alert(`${currentLang==='ne'?'अपोइन्टमेन्ट स्मरण':'Appointment Reminder'} for ${user}!`); }, diff);}
}
</script>
</body>
</html>
